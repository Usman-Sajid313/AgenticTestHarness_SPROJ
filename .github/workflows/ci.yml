name: Next.js CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentic_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agentic_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/agentic_test?schema=public
      JWT_SECRET: ci-test-jwt-secret
      JWT_EXPIRES_DAYS: "14"
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Apply schema to test DB
        run: npx prisma generate && npx prisma db push

      - name: Build app
        run: npm run build

      - name: Run tests (start server on test DB, then Vitest)
        run: npx start-server-and-test "npm run start" http://localhost:3000 "npm run test"
