services:
  db:
    image: postgres:16-alpine
    container_name: agentic-test-harness-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_test_harness}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agentic_test_harness}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-test-harness-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agentic_test_harness}
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agentic_test_harness}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_DAYS: ${JWT_EXPIRES_DAYS:-14}

      GOOGLE_GEMINI_API: ${GOOGLE_GEMINI_API}
      GROQ_API_KEY: ${GROQ_API_KEY}

      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_API_KEY_1: ${OPENAI_API_KEY_1:-}
      OPENAI_API_KEY_2: ${OPENAI_API_KEY_2:-}
      OPENAI_MODEL_1: ${OPENAI_MODEL_1:-}
      OPENAI_MODEL_2: ${OPENAI_MODEL_2:-}

      NODE_ENV: production
    networks:
      - app-network
    volumes:
      - ./prisma:/app/prisma:ro
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:

networks:
  app-network:
    driver: bridge
